<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grand Hotel Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a2a6c, #2a3a7c);
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            padding: 40px 35px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #1a2a6c;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #6c757d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #3498db;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:hover {
            background-color: #2980b9;
        }

        .error-message {
            background-color: #ffebee;
            color: #d32f2f;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .demo-info {
            margin-top: 25px;
            padding: 12px 15px;
            background-color: #e3f2fd;
            border-radius: 6px;
            font-size: 13px;
            color: #1976d2;
            text-align: center;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
        }

        .login-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>🏨 Grand Hotel</h2>
            <p>Management System Login</p>
        </div>

        <div class="error-message" id="error-message">Invalid username or password</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="login-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // NOTE: This is a client-side demo login for a frontend-only project.
        // Credentials are stored in JS and are NOT secure — for a real deployment,
        // this check must happen on a backend server against a hashed password in a database.
        const VALID_USERNAME = 'admin';
        const VALID_PASSWORD = 'admin123';

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        // If already logged in, skip straight to dashboard
        if (localStorage.getItem('hotelLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        function getUsers() {
            const stored = localStorage.getItem('hotelUsers');
            return stored ? JSON.parse(stored) : [];
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Check built-in admin credentials
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                localStorage.setItem('hotelLoggedIn', 'true');
                localStorage.setItem('hotelUsername', username.charAt(0).toUpperCase() + username.slice(1));
                window.location.href = 'index.html';
                return;
            }

            // Check registered users
            const users = getUsers();
            const matchedUser = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);

            if (matchedUser) {
                localStorage.setItem('hotelLoggedIn', 'true');
                localStorage.setItem('hotelUsername', matchedUser.fullname || matchedUser.username);
                window.location.href = 'index.html';
            } else {
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Management - Hotel System</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #1a2a6c, #2a3a7c);
            color: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 100;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .sidebar-menu ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar-menu li {
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
        }

        .sidebar-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-menu a i {
            margin-right: 10px;
            font-size: 18px;
        }

        .sidebar-menu .active a {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border-left: 4px solid #4CAF50;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 250px;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            z-index: 99;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #f5f7fa;
            border-radius: 20px;
            padding: 8px 15px;
            width: 300px;
        }

        .search-box span {
            margin-right: 8px;
            color: #777;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-info img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: #ddd;
        }

        /* Content Area */
        .content {
            padding: 25px;
            flex: 1;
            margin-top: 70px;
        }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title h1 {
            font-size: 28px;
            color: #2c3e50;
        }

        /* Button Styles */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background-color: #27ae60;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-header h3 {
            font-size: 32px;
            color: #2c3e50;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .blue {
            background-color: #e3f2fd;
            color: #1976d2;
        }

        .green {
            background-color: #e8f5e9;
            color: #388e3c;
        }

        .orange {
            background-color: #fff3e0;
            color: #f57c00;
        }

        /* Table */
        .table-container {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f8f9fa;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        th {
            font-weight: 600;
            color: #495057;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-checked-in {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-checked-out {
            background-color: #ffebee;
            color: #c62828;
        }

        .status-reserved {
            background-color: #fff3e0;
            color: #ef6c00;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background-color: #ffc107;
            color: white;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6c757d;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
            }
            
            .sidebar-menu ul {
                display: flex;
                overflow-x: auto;
            }
            
            .sidebar-menu li {
                flex-shrink: 0;
            }
            
            .cards {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .page-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            table {
                min-width: 700px;
            }
        }
    </style>
<script>
        // Auth guard - redirect to login page if not logged in
        if (localStorage.getItem('hotelLoggedIn') !== 'true') {
            window.location.href = '../login.html';
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Grand Hotel</h2>
                <p>Management System</p>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li><a href="../index.html"><i>📊</i> Dashboard</a></li>
                    <li><a href="rooms.html"><i>🏨</i> Rooms</a></li>
                    <li><a href="bookings.html"><i>📅</i> Bookings</a></li>
                    <li><a href="guests.html"><i>👥</i> Guests</a></li>
                    <li><a href="staff.html"><i>👨‍💼</i> Staff</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="top-nav">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search guests..." id="search-guests">
                </div>
                <div class="user-info">
                    <div class="user-avatar"></div>
                    <span id="logged-in-user">Admin User</span>
                    <button class="btn" id="logout-btn" style="margin-left:15px; background:#e74c3c; color:white; padding:6px 14px;">Logout</button>
                </div>
            </header>

            <main class="content">
                <div class="page-title">
                    <h1>Guest Management</h1>
                    <button class="btn btn-primary" id="add-guest-btn">Add Guest</button>
                </div>

                <!-- Guest Statistics -->
                <div class="cards">
                    <div class="card">
                        <div class="card-header">
                            <h3 id="total-guests">0</h3>
                            <div class="card-icon blue">👥</div>
                        </div>
                        <p>Total Guests</p>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3 id="current-guests">0</h3>
                            <div class="card-icon green">🏨</div>
                        </div>
                        <p>Currently Staying</p>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3 id="vip-guests">0</h3>
                            <div class="card-icon orange">⭐</div>
                        </div>
                        <p>VIP Guests</p>
                    </div>
                </div>

                <!-- Guests Table -->
                <div class="table-container">
                    <table id="guests-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Room</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="guests-table-body">
                            <!-- Table rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Guest Modal -->
    <div class="modal" id="guest-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Guest</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="guest-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="guest-id">Guest ID</label>
                            <input type="text" id="guest-id" class="form-control" readonly>
                        </div>
                        <div class="form-group">
                            <label for="guest-status">Status</label>
                            <select id="guest-status" class="form-control">
                                <option value="Checked In">Checked In</option>
                                <option value="Checked Out">Checked Out</option>
                                <option value="Reserved">Reserved</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" class="form-control" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="room-number">Room Number</label>
                            <input type="text" id="room-number" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="vip-status">VIP Status</label>
                            <select id="vip-status" class="form-control">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="check-in">Check-In Date</label>
                            <input type="date" id="check-in" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="check-out">Check-Out Date</label>
                            <input type="date" id="check-out" class="form-control" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" id="cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="save-guest-btn">Save Guest</button>
            </div>
        </div>
    </div>

    <script>
        // Sample guest data
        let guests = [
            {
                id: "G001",
                firstName: "John",
                lastName: "Doe",
                email: "john.doe@example.com",
                phone: "+1 (555) 123-4567",
                room: "101",
                checkIn: "2023-05-15",
                checkOut: "2023-05-20",
                status: "Checked In",
                vip: "No"
            },
            {
                id: "G002",
                firstName: "Jane",
                lastName: "Smith",
                email: "jane.smith@example.com",
                phone: "+1 (555) 987-6543",
                room: "205",
                checkIn: "2023-05-18",
                checkOut: "2023-05-25",
                status: "Reserved",
                vip: "Yes"
            },
            {
                id: "G003",
                firstName: "Robert",
                lastName: "Johnson",
                email: "robert.j@example.com",
                phone: "+1 (555) 456-7890",
                room: "312",
                checkIn: "2023-05-10",
                checkOut: "2023-05-17",
                status: "Checked Out",
                vip: "No"
            }
        ];

        // DOM Elements
        const addGuestBtn = document.getElementById('add-guest-btn');
        const guestModal = document.getElementById('guest-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const cancelBtn = document.getElementById('cancel-btn');
        const saveGuestBtn = document.getElementById('save-guest-btn');
        const guestForm = document.getElementById('guest-form');
        const guestsTableBody = document.getElementById('guests-table-body');
        const searchInput = document.getElementById('search-guests');
        const modalTitle = document.getElementById('modal-title');

        // Statistics elements
        const totalGuestsEl = document.getElementById('total-guests');
        const currentGuestsEl = document.getElementById('current-guests');
        const vipGuestsEl = document.getElementById('vip-guests');

        // State variables
        let isEditing = false;
        let currentEditId = null;

        // Event Listeners
        addGuestBtn.addEventListener('click', openAddGuestModal);
        closeModalBtn.addEventListener('click', closeGuestModal);
        cancelBtn.addEventListener('click', closeGuestModal);
        saveGuestBtn.addEventListener('click', saveGuest);
        searchInput.addEventListener('input', filterGuests);

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderGuestsTable();
            updateStatistics();

            // Show logged-in username
            const loggedInUser = localStorage.getItem('hotelUsername') || 'Admin User';
            document.getElementById('logged-in-user').textContent = loggedInUser;

            // Logout button
            document.getElementById('logout-btn').addEventListener('click', function() {
                localStorage.removeItem('hotelLoggedIn');
                localStorage.removeItem('hotelUsername');
                window.location.href = '../login.html';
            });
        });

        // Functions
        function openAddGuestModal() {
            isEditing = false;
            currentEditId = null;
            modalTitle.textContent = "Add New Guest";
            guestForm.reset();
            
            // Generate a new guest ID
            document.getElementById('guest-id').value = generateGuestId();
            
            // Set default dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('check-in').value = today;
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('check-out').value = tomorrow.toISOString().split('T')[0];
            
            guestModal.style.display = 'flex';
        }

        function openEditGuestModal(guestId) {
            isEditing = true;
            currentEditId = guestId;
            modalTitle.textContent = "Edit Guest";
            
            const guest = guests.find(g => g.id === guestId);
            if (guest) {
                document.getElementById('guest-id').value = guest.id;
                document.getElementById('first-name').value = guest.firstName;
                document.getElementById('last-name').value = guest.lastName;
                document.getElementById('email').value = guest.email;
                document.getElementById('phone').value = guest.phone;
                document.getElementById('room-number').value = guest.room;
                document.getElementById('check-in').value = guest.checkIn;
                document.getElementById('check-out').value = guest.checkOut;
                document.getElementById('guest-status').value = guest.status;
                document.getElementById('vip-status').value = guest.vip;
            }
            
            guestModal.style.display = 'flex';
        }

        function closeGuestModal() {
            guestModal.style.display = 'none';
        }

        function generateGuestId() {
            const lastId = guests.length > 0 ? parseInt(guests[guests.length - 1].id.substring(1)) : 0;
            return `G${(lastId + 1).toString().padStart(3, '0')}`;
        }

        function saveGuest() {
            // Get form values
            const guestId = document.getElementById('guest-id').value;
            const firstName = document.getElementById('first-name').value;
            const lastName = document.getElementById('last-name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const room = document.getElementById('room-number').value;
            const checkIn = document.getElementById('check-in').value;
            const checkOut = document.getElementById('check-out').value;
            const status = document.getElementById('guest-status').value;
            const vip = document.getElementById('vip-status').value;

            // Validate form
            if (!firstName || !lastName || !email || !phone || !room || !checkIn || !checkOut) {
                alert('Please fill in all required fields');
                return;
            }

            if (isEditing) {
                // Update existing guest
                const index = guests.findIndex(g => g.id === currentEditId);
                if (index !== -1) {
                    guests[index] = {
                        id: guestId,
                        firstName,
                        lastName,
                        email,
                        phone,
                        room,
                        checkIn,
                        checkOut,
                        status,
                        vip
                    };
                }
            } else {
                // Add new guest
                guests.push({
                    id: guestId,
                    firstName,
                    lastName,
                    email,
                    phone,
                    room,
                    checkIn,
                    checkOut,
                    status,
                    vip
                });
            }

            // Update UI
            renderGuestsTable();
            updateStatistics();
            closeGuestModal();
        }

        function deleteGuest(guestId) {
            if (confirm('Are you sure you want to delete this guest?')) {
                guests = guests.filter(guest => guest.id !== guestId);
                renderGuestsTable();
                updateStatistics();
            }
        }

        function renderGuestsTable() {
            guestsTableBody.innerHTML = '';
            
            guests.forEach(guest => {
                const row = document.createElement('tr');
                
                // Determine status class
                let statusClass = '';
                if (guest.status === 'Checked In') statusClass = 'status-checked-in';
                else if (guest.status === 'Checked Out') statusClass = 'status-checked-out';
                else if (guest.status === 'Reserved') statusClass = 'status-reserved';
                
                row.innerHTML = `
                    <td>${guest.id}</td>
                    <td>${guest.firstName} ${guest.lastName}</td>
                    <td>${guest.email}</td>
                    <td>${guest.phone}</td>
                    <td>${guest.room}</td>
                    <td>${formatDate(guest.checkIn)}</td>
                    <td>${formatDate(guest.checkOut)}</td>
                    <td><span class="status ${statusClass}">${guest.status}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" onclick="openEditGuestModal('${guest.id}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteGuest('${guest.id}')">Delete</button>
                        </div>
                    </td>
                `;
                
                guestsTableBody.appendChild(row);
            });
        }

        function updateStatistics() {
            // Update total guests
            totalGuestsEl.textContent = guests.length;
            
            // Update current guests (checked in)
            const currentGuests = guests.filter(guest => guest.status === 'Checked In').length;
            currentGuestsEl.textContent = currentGuests;
            
            // Update VIP guests
            const vipGuests = guests.filter(guest => guest.vip === 'Yes').length;
            vipGuestsEl.textContent = vipGuests;
        }

        function filterGuests() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredGuests = guests.filter(guest => 
                guest.firstName.toLowerCase().includes(searchTerm) ||
                guest.lastName.toLowerCase().includes(searchTerm) ||
                guest.email.toLowerCase().includes(searchTerm) ||
                guest.phone.includes(searchTerm) ||
                guest.room.includes(searchTerm) ||
                guest.id.toLowerCase().includes(searchTerm)
            );
            
            // Re-render table with filtered guests
            guestsTableBody.innerHTML = '';
            
            filteredGuests.forEach(guest => {
                const row = document.createElement('tr');
                
                // Determine status class
                let statusClass = '';
                if (guest.status === 'Checked In') statusClass = 'status-checked-in';
                else if (guest.status === 'Checked Out') statusClass = 'status-checked-out';
                else if (guest.status === 'Reserved') statusClass = 'status-reserved';
                
                row.innerHTML = `
                    <td>${guest.id}</td>
                    <td>${guest.firstName} ${guest.lastName}</td>
                    <td>${guest.email}</td>
                    <td>${guest.phone}</td>
                    <td>${guest.room}</td>
                    <td>${formatDate(guest.checkIn)}</td>
                    <td>${formatDate(guest.checkOut)}</td>
                    <td><span class="status ${statusClass}">${guest.status}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" onclick="openEditGuestModal('${guest.id}')">Edit</button>
                            <button class="action-btn delete-btn" onclick="deleteGuest('${guest.id}')">Delete</button>
                        </div>
                    </td>
                `;
                
                guestsTableBody.appendChild(row);
            });
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }
    </script>
</body>
</html>

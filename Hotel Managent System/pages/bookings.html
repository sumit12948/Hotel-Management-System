<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Management - Hotel System</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #1a2a6c, #2a3a7c);
            color: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 100;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .sidebar-menu ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar-menu li {
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
        }

        .sidebar-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-menu a i {
            margin-right: 10px;
            font-size: 18px;
        }

        .sidebar-menu .active a {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border-left: 4px solid #4CAF50;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: 250px;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            z-index: 99;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #f5f7fa;
            border-radius: 20px;
            padding: 8px 15px;
            width: 300px;
        }

        .search-box span {
            margin-right: 8px;
            color: #777;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-info img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: #ddd;
        }

        /* Content Area */
        .content {
            padding: 25px;
            flex: 1;
            margin-top: 70px;
        }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title h1 {
            font-size: 28px;
            color: #2c3e50;
        }

        /* Button Styles */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background-color: #27ae60;
        }

        .btn-warning {
            background-color: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background-color: #e67e22;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        /* Form Styles */
        .form-container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 16px;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        /* Table */
        .table-container {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #f8f9fa;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        th {
            font-weight: 600;
            color: #495057;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-confirmed {
            background-color: #e8f5e9;
            color: #2e7d32;
        }

        .status-checked-in {
            background-color: #e3f2fd;
            color: #1565c0;
        }

        .status-checked-out {
            background-color: #f3e5f5;
            color: #7b1fa2;
        }

        .status-cancelled {
            background-color: #ffebee;
            color: #c62828;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background-color: #ffc107;
            color: white;
        }

        .checkin-btn {
            background-color: #2ecc71;
            color: white;
        }

        .checkout-btn {
            background-color: #3498db;
            color: white;
        }

        .cancel-btn {
            background-color: #e74c3c;
            color: white;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 10px;
            width: 600px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 22px;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6c757d;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
            }
            
            .sidebar-menu ul {
                display: flex;
                overflow-x: auto;
            }
            
            .sidebar-menu li {
                flex-shrink: 0;
            }
            
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-box {
                width: 100%;
            }
            
            .page-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .table-container {
                overflow-x: auto;
            }
            
            table {
                min-width: 800px;
            }
        }
    </style>
<script>
        // Auth guard - redirect to login page if not logged in
        if (localStorage.getItem('hotelLoggedIn') !== 'true') {
            window.location.href = '../login.html';
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Grand Hotel</h2>
                <p>Management System</p>
            </div>
            <nav class="sidebar-menu">
                 <ul>
                    <li><a href="../index.html"><i>📊</i> Dashboard</a></li>
                    <li><a href="rooms.html"><i>🏨</i> Rooms</a></li>
                    <li><a href="bookings.html"><i>📅</i> Bookings</a></li>
                    <li><a href="guests.html"><i>👥</i> Guests</a></li>
                    <li><a href="staff.html"><i>👨‍💼</i> Staff</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="top-nav">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search bookings..." id="search-bookings">
                </div>
                <div class="user-info">
                    <div class="user-avatar"></div>
                    <span id="logged-in-user">Admin User</span>
                    <button class="btn" id="logout-btn" style="margin-left:15px; background:#e74c3c; color:white; padding:6px 14px;">Logout</button>
                </div>
            </header>

            <main class="content">
                <div class="page-title">
                    <h1>Booking Management</h1>
                    <button class="btn btn-primary" id="new-booking-btn">New Booking</button>
                </div>

                <!-- Booking Filters -->
                <div class="form-container">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select class="form-control" id="booking-status-filter">
                                <option value="">All Status</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="checked-in">Checked In</option>
                                <option value="checked-out">Checked Out</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>From Date</label>
                            <input type="date" class="form-control" id="from-date-filter">
                        </div>
                        <div class="form-group">
                            <label>To Date</label>
                            <input type="date" class="form-control" id="to-date-filter">
                        </div>
                        <div class="form-group">
                            <label>Room Type</label>
                            <select class="form-control" id="room-type-filter">
                                <option value="">All Types</option>
                                <option value="single">Single</option>
                                <option value="double">Double</option>
                                <option value="suite">Suite</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="apply-filters">Apply Filters</button>
                    <button class="btn" id="clear-filters">Clear Filters</button>
                </div>

                <!-- Bookings Table -->
                <div class="table-container">
                    <table id="bookings-table">
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Guest Name</th>
                                <th>Room Type</th>
                                <th>Room No</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                                <th>Guests</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-table-body">
                            <!-- Table rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- New Booking Modal -->
    <div class="modal" id="new-booking-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Booking</h2>
                <button class="close-btn" id="close-booking-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="new-booking-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Guest Name</label>
                            <input type="text" class="form-control" id="guest-name" required>
                        </div>
                        <div class="form-group">
                            <label>Guest Email</label>
                            <input type="email" class="form-control" id="guest-email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Guest Phone</label>
                            <input type="tel" class="form-control" id="guest-phone" required>
                        </div>
                        <div class="form-group">
                            <label>Room Type</label>
                            <select class="form-control" id="room-type" required>
                                <option value="">Select Room Type</option>
                                <option value="single">Single</option>
                                <option value="double">Double</option>
                                <option value="suite">Suite</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Check-in Date</label>
                            <input type="date" class="form-control" id="checkin-date" required>
                        </div>
                        <div class="form-group">
                            <label>Check-out Date</label>
                            <input type="date" class="form-control" id="checkout-date" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Adults</label>
                            <input type="number" class="form-control" id="adults" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Children</label>
                            <input type="number" class="form-control" id="children" min="0" value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Special Requests</label>
                        <textarea class="form-control" id="special-requests" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" id="cancel-booking">Cancel</button>
                <button class="btn btn-primary" id="save-booking">Create Booking</button>
            </div>
        </div>
    </div>

    <!-- Booking Details Modal -->
    <div class="modal" id="booking-details-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Booking Details</h2>
                <button class="close-btn" id="close-details-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="booking-details-content">
                    <!-- Details will be populated by JavaScript -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="close-details">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Sample booking data
        let bookings = [
            {
                id: "B001",
                guestName: "John Doe",
                guestEmail: "john.doe@example.com",
                guestPhone: "+1 (555) 123-4567",
                roomType: "double",
                roomNumber: "205",
                checkIn: "2023-05-15",
                checkOut: "2023-05-20",
                adults: 2,
                children: 0,
                specialRequests: "Non-smoking room preferred",
                status: "confirmed",
                totalAmount: "$450.00"
            },
            {
                id: "B002",
                guestName: "Jane Smith",
                guestEmail: "jane.smith@example.com",
                guestPhone: "+1 (555) 987-6543",
                roomType: "suite",
                roomNumber: "301",
                checkIn: "2023-05-18",
                checkOut: "2023-05-25",
                adults: 2,
                children: 1,
                specialRequests: "Extra bed for child",
                status: "checked-in",
                totalAmount: "$980.00"
            },
            {
                id: "B003",
                guestName: "Robert Johnson",
                guestEmail: "robert.j@example.com",
                guestPhone: "+1 (555) 456-7890",
                roomType: "single",
                roomNumber: "112",
                checkIn: "2023-05-10",
                checkOut: "2023-05-17",
                adults: 1,
                children: 0,
                specialRequests: "",
                status: "checked-out",
                totalAmount: "$490.00"
            },
            {
                id: "B004",
                guestName: "Maria Garcia",
                guestEmail: "maria.g@example.com",
                guestPhone: "+1 (555) 234-5678",
                roomType: "double",
                roomNumber: "208",
                checkIn: "2023-05-22",
                checkOut: "2023-05-25",
                adults: 2,
                children: 0,
                specialRequests: "Late check-out if possible",
                status: "confirmed",
                totalAmount: "$360.00"
            }
        ];

        // Room availability data
        const availableRooms = {
            single: ["101", "102", "103", "104", "105", "106", "107", "108", "109", "110", "111", "112"],
            double: ["201", "202", "203", "204", "205", "206", "207", "208", "209", "210"],
            suite: ["301", "302", "303", "304", "305"]
        };

        // DOM Elements
        const newBookingBtn = document.getElementById('new-booking-btn');
        const newBookingModal = document.getElementById('new-booking-modal');
        const closeBookingModalBtn = document.getElementById('close-booking-modal');
        const cancelBookingBtn = document.getElementById('cancel-booking');
        const saveBookingBtn = document.getElementById('save-booking');
        const bookingForm = document.getElementById('new-booking-form');
        const bookingsTableBody = document.getElementById('bookings-table-body');
        const searchInput = document.getElementById('search-bookings');
        const statusFilter = document.getElementById('booking-status-filter');
        const fromDateFilter = document.getElementById('from-date-filter');
        const toDateFilter = document.getElementById('to-date-filter');
        const roomTypeFilter = document.getElementById('room-type-filter');
        const applyFiltersBtn = document.getElementById('apply-filters');
        const clearFiltersBtn = document.getElementById('clear-filters');
        const bookingDetailsModal = document.getElementById('booking-details-modal');
        const closeDetailsModalBtn = document.getElementById('close-details-modal');
        const closeDetailsBtn = document.getElementById('close-details');
        const bookingDetailsContent = document.getElementById('booking-details-content');

        // Event Listeners
        newBookingBtn.addEventListener('click', openNewBookingModal);
        closeBookingModalBtn.addEventListener('click', closeNewBookingModal);
        cancelBookingBtn.addEventListener('click', closeNewBookingModal);
        saveBookingBtn.addEventListener('click', saveBooking);
        searchInput.addEventListener('input', filterBookings);
        applyFiltersBtn.addEventListener('click', applyFilters);
        clearFiltersBtn.addEventListener('click', clearFilters);
        closeDetailsModalBtn.addEventListener('click', closeBookingDetails);
        closeDetailsBtn.addEventListener('click', closeBookingDetails);

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderBookingsTable();
            setDefaultDates();

            // Show logged-in username
            const loggedInUser = localStorage.getItem('hotelUsername') || 'Admin User';
            document.getElementById('logged-in-user').textContent = loggedInUser;

            // Logout button
            document.getElementById('logout-btn').addEventListener('click', function() {
                localStorage.removeItem('hotelLoggedIn');
                localStorage.removeItem('hotelUsername');
                window.location.href = '../login.html';
            });
        });

        // Functions
        function openNewBookingModal() {
            newBookingModal.style.display = 'flex';
            
            // Set default dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkin-date').value = today;
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('checkout-date').value = tomorrow.toISOString().split('T')[0];
            
            // Reset form
            bookingForm.reset();
        }

        function closeNewBookingModal() {
            newBookingModal.style.display = 'none';
        }

        function closeBookingDetails() {
            bookingDetailsModal.style.display = 'none';
        }

        function setDefaultDates() {
            const today = new Date().toISOString().split('T')[0];
            const nextWeek = new Date();
            nextWeek.setDate(nextWeek.getDate() + 7);
            const nextWeekFormatted = nextWeek.toISOString().split('T')[0];
            
            fromDateFilter.value = today;
            toDateFilter.value = nextWeekFormatted;
        }

        function generateBookingId() {
            const lastId = bookings.length > 0 ? parseInt(bookings[bookings.length - 1].id.substring(1)) : 0;
            return `B${(lastId + 1).toString().padStart(3, '0')}`;
        }

        function getAvailableRoom(roomType) {
            // Get all booked rooms for the selected dates
            const checkInDate = document.getElementById('checkin-date').value;
            const checkOutDate = document.getElementById('checkout-date').value;
            
            const bookedRooms = bookings
                .filter(booking => 
                    booking.roomType === roomType && 
                    booking.status !== 'cancelled' &&
                    ((checkInDate >= booking.checkIn && checkInDate < booking.checkOut) ||
                     (checkOutDate > booking.checkIn && checkOutDate <= booking.checkOut) ||
                     (checkInDate <= booking.checkIn && checkOutDate >= booking.checkOut))
                )
                .map(booking => booking.roomNumber);
            
            // Find first available room
            return availableRooms[roomType].find(room => !bookedRooms.includes(room));
        }

        function saveBooking() {
            // Get form values
            const guestName = document.getElementById('guest-name').value;
            const guestEmail = document.getElementById('guest-email').value;
            const guestPhone = document.getElementById('guest-phone').value;
            const roomType = document.getElementById('room-type').value;
            const checkIn = document.getElementById('checkin-date').value;
            const checkOut = document.getElementById('checkout-date').value;
            const adults = document.getElementById('adults').value;
            const children = document.getElementById('children').value;
            const specialRequests = document.getElementById('special-requests').value;

            // Validate form
            if (!guestName || !guestEmail || !guestPhone || !roomType || !checkIn || !checkOut || !adults) {
                alert('Please fill in all required fields');
                return;
            }

            // Validate dates
            if (new Date(checkIn) >= new Date(checkOut)) {
                alert('Check-out date must be after check-in date');
                return;
            }

            // Get available room
            const roomNumber = getAvailableRoom(roomType);
            if (!roomNumber) {
                alert('No available rooms of this type for the selected dates');
                return;
            }

            // Calculate total amount
            const nights = Math.ceil((new Date(checkOut) - new Date(checkIn)) / (1000 * 60 * 60 * 24));
            const roomRates = { single: 70, double: 90, suite: 140 };
            const totalAmount = nights * roomRates[roomType];

            // Add new booking
            const newBooking = {
                id: generateBookingId(),
                guestName,
                guestEmail,
                guestPhone,
                roomType,
                roomNumber,
                checkIn,
                checkOut,
                adults: parseInt(adults),
                children: parseInt(children),
                specialRequests,
                status: 'confirmed',
                totalAmount: `$${totalAmount}.00`
            };

            bookings.push(newBooking);

            // Update UI
            renderBookingsTable();
            closeNewBookingModal();
            
            // Show success message
            alert(`Booking created successfully!\nBooking ID: ${newBooking.id}\nRoom: ${newBooking.roomNumber}`);
        }

        function updateBookingStatus(bookingId, newStatus) {
            const booking = bookings.find(b => b.id === bookingId);
            if (booking) {
                booking.status = newStatus;
                renderBookingsTable();
            }
        }

        function showBookingDetails(bookingId) {
            const booking = bookings.find(b => b.id === bookingId);
            if (booking) {
                bookingDetailsContent.innerHTML = `
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Booking ID:</strong></label>
                            <p>${booking.id}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Status:</strong></label>
                            <p><span class="status status-${booking.status}">${formatStatus(booking.status)}</span></p>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Guest Name:</strong></label>
                            <p>${booking.guestName}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Guest Email:</strong></label>
                            <p>${booking.guestEmail}</p>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Guest Phone:</strong></label>
                            <p>${booking.guestPhone}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Room Type:</strong></label>
                            <p>${formatRoomType(booking.roomType)}</p>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Room Number:</strong></label>
                            <p>${booking.roomNumber}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Total Amount:</strong></label>
                            <p>${booking.totalAmount}</p>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Check-in Date:</strong></label>
                            <p>${formatDate(booking.checkIn)}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Check-out Date:</strong></label>
                            <p>${formatDate(booking.checkOut)}</p>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><strong>Adults:</strong></label>
                            <p>${booking.adults}</p>
                        </div>
                        <div class="form-group">
                            <label><strong>Children:</strong></label>
                            <p>${booking.children}</p>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><strong>Special Requests:</strong></label>
                        <p>${booking.specialRequests || 'None'}</p>
                    </div>
                `;
                bookingDetailsModal.style.display = 'flex';
            }
        }

        function deleteBooking(bookingId) {
            if (confirm('Are you sure you want to cancel this booking?')) {
                const booking = bookings.find(b => b.id === bookingId);
                if (booking) {
                    booking.status = 'cancelled';
                    renderBookingsTable();
                }
            }
        }

        function renderBookingsTable() {
            bookingsTableBody.innerHTML = '';
            
            bookings.forEach(booking => {
                const row = document.createElement('tr');
                
                // Determine status class
                let statusClass = '';
                if (booking.status === 'confirmed') statusClass = 'status-confirmed';
                else if (booking.status === 'checked-in') statusClass = 'status-checked-in';
                else if (booking.status === 'checked-out') statusClass = 'status-checked-out';
                else if (booking.status === 'cancelled') statusClass = 'status-cancelled';
                
                row.innerHTML = `
                    <td>${booking.id}</td>
                    <td>${booking.guestName}</td>
                    <td>${formatRoomType(booking.roomType)}</td>
                    <td>${booking.roomNumber}</td>
                    <td>${formatDate(booking.checkIn)}</td>
                    <td>${formatDate(booking.checkOut)}</td>
                    <td>${booking.adults} Adult(s), ${booking.children} Child(ren)</td>
                    <td><span class="status ${statusClass}">${formatStatus(booking.status)}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" onclick="showBookingDetails('${booking.id}')">Details</button>
                            ${booking.status === 'confirmed' ? 
                                `<button class="action-btn checkin-btn" onclick="updateBookingStatus('${booking.id}', 'checked-in')">Check In</button>
                                 <button class="action-btn cancel-btn" onclick="deleteBooking('${booking.id}')">Cancel</button>` : ''}
                            ${booking.status === 'checked-in' ? 
                                `<button class="action-btn checkout-btn" onclick="updateBookingStatus('${booking.id}', 'checked-out')">Check Out</button>` : ''}
                        </div>
                    </td>
                `;
                
                bookingsTableBody.appendChild(row);
            });
        }

        function filterBookings() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredBookings = bookings.filter(booking => 
                booking.guestName.toLowerCase().includes(searchTerm) ||
                booking.guestEmail.toLowerCase().includes(searchTerm) ||
                booking.id.toLowerCase().includes(searchTerm) ||
                booking.roomNumber.includes(searchTerm)
            );
            
            renderFilteredBookings(filteredBookings);
        }

        function applyFilters() {
            const status = statusFilter.value;
            const fromDate = fromDateFilter.value;
            const toDate = toDateFilter.value;
            const roomType = roomTypeFilter.value;
            
            let filteredBookings = bookings;
            
            // Apply status filter
            if (status) {
                filteredBookings = filteredBookings.filter(booking => booking.status === status);
            }
            
            // Apply date filter
            if (fromDate) {
                filteredBookings = filteredBookings.filter(booking => booking.checkIn >= fromDate);
            }
            
            if (toDate) {
                filteredBookings = filteredBookings.filter(booking => booking.checkOut <= toDate);
            }
            
            // Apply room type filter
            if (roomType) {
                filteredBookings = filteredBookings.filter(booking => booking.roomType === roomType);
            }
            
            renderFilteredBookings(filteredBookings);
        }

        function clearFilters() {
            statusFilter.value = '';
            setDefaultDates();
            roomTypeFilter.value = '';
            searchInput.value = '';
            renderBookingsTable();
        }

        function renderFilteredBookings(filteredBookings) {
            bookingsTableBody.innerHTML = '';
            
            if (filteredBookings.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan="9" style="text-align: center;">No bookings found matching the criteria</td>`;
                bookingsTableBody.appendChild(row);
                return;
            }
            
            filteredBookings.forEach(booking => {
                const row = document.createElement('tr');
                
                // Determine status class
                let statusClass = '';
                if (booking.status === 'confirmed') statusClass = 'status-confirmed';
                else if (booking.status === 'checked-in') statusClass = 'status-checked-in';
                else if (booking.status === 'checked-out') statusClass = 'status-checked-out';
                else if (booking.status === 'cancelled') statusClass = 'status-cancelled';
                
                row.innerHTML = `
                    <td>${booking.id}</td>
                    <td>${booking.guestName}</td>
                    <td>${formatRoomType(booking.roomType)}</td>
                    <td>${booking.roomNumber}</td>
                    <td>${formatDate(booking.checkIn)}</td>
                    <td>${formatDate(booking.checkOut)}</td>
                    <td>${booking.adults} Adult(s), ${booking.children} Child(ren)</td>
                    <td><span class="status ${statusClass}">${formatStatus(booking.status)}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" onclick="showBookingDetails('${booking.id}')">Details</button>
                            ${booking.status === 'confirmed' ? 
                                `<button class="action-btn checkin-btn" onclick="updateBookingStatus('${booking.id}', 'checked-in')">Check In</button>
                                 <button class="action-btn cancel-btn" onclick="deleteBooking('${booking.id}')">Cancel</button>` : ''}
                            ${booking.status === 'checked-in' ? 
                                `<button class="action-btn checkout-btn" onclick="updateBookingStatus('${booking.id}', 'checked-out')">Check Out</button>` : ''}
                        </div>
                    </td>
                `;
                
                bookingsTableBody.appendChild(row);
            });
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        function formatStatus(status) {
            return status.charAt(0).toUpperCase() + status.slice(1).replace('-', ' ');
        }

        function formatRoomType(roomType) {
            return roomType.charAt(0).toUpperCase() + roomType.slice(1);
        }
    </script>
</body>
</html>
